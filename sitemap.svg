<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 900" width="1100" height="900" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000022"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="900" fill="#f8fafc"/>

  <!-- Title -->
  <text x="550" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">Pokedex — Sitemap</text>
  <text x="550" y="56" text-anchor="middle" font-size="12" fill="#64748b">Vue 2.7 · Vue Router 3 · Hash-based routing</text>

  <!-- ═══════════════════════════════════════════════════════════
       LAYER 0 — App.vue (root)
  ═══════════════════════════════════════════════════════════ -->
  <!-- App.vue -->
  <rect x="400" y="80" width="300" height="52" rx="10" fill="#6366f1" filter="url(#shadow)"/>
  <text x="550" y="101" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">App.vue</text>
  <text x="550" y="118" text-anchor="middle" font-size="11" fill="#c7d2fe">Root · Header · MainMenuNavigation</text>

  <!-- ═══════════════════════════════════════════════════════════
       LAYER 1 — Routes (pages)
  ═══════════════════════════════════════════════════════════ -->

  <!-- Connecting lines from App to routes -->
  <!-- Home -->
  <line x1="550" y1="132" x2="100" y2="218" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Pokedex -->
  <line x1="550" y1="132" x2="330" y2="218" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Types -->
  <line x1="550" y1="132" x2="620" y2="218" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Settings -->
  <line x1="550" y1="132" x2="910" y2="218" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- HOME -->
  <rect x="30" y="218" width="140" height="56" rx="8" fill="#0ea5e9" filter="url(#shadow)"/>
  <text x="100" y="240" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Home</text>
  <text x="100" y="255" text-anchor="middle" font-size="10" fill="#bae6fd">Home.vue</text>
  <text x="100" y="268" text-anchor="middle" font-size="10" fill="#bae6fd">route: /</text>

  <!-- POKEDEX -->
  <rect x="210" y="218" width="160" height="56" rx="8" fill="#0ea5e9" filter="url(#shadow)"/>
  <text x="290" y="240" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Pokedex</text>
  <text x="290" y="255" text-anchor="middle" font-size="10" fill="#bae6fd">Pokedex.vue</text>
  <text x="290" y="268" text-anchor="middle" font-size="10" fill="#bae6fd">route: /pokedex</text>

  <!-- TYPES -->
  <rect x="540" y="218" width="160" height="56" rx="8" fill="#0ea5e9" filter="url(#shadow)"/>
  <text x="620" y="240" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Types</text>
  <text x="620" y="255" text-anchor="middle" font-size="10" fill="#bae6fd">Types.vue</text>
  <text x="620" y="268" text-anchor="middle" font-size="10" fill="#bae6fd">route: /types</text>

  <!-- SETTINGS -->
  <rect x="840" y="218" width="160" height="56" rx="8" fill="#0ea5e9" filter="url(#shadow)"/>
  <text x="920" y="240" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Settings</text>
  <text x="920" y="255" text-anchor="middle" font-size="10" fill="#bae6fd">Settings.vue</text>
  <text x="920" y="268" text-anchor="middle" font-size="10" fill="#bae6fd">route: /settings</text>

  <!-- ═══════════════════════════════════════════════════════════
       LAYER 2 — Feature components
  ═══════════════════════════════════════════════════════════ -->

  <!-- Home children: icons -->
  <line x1="100" y1="274" x2="100" y2="344" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="24" y="344" width="152" height="44" rx="6" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1"/>
  <text x="100" y="361" text-anchor="middle" font-size="11" font-weight="600" fill="#0369a1">Home Icons</text>
  <text x="100" y="376" text-anchor="middle" font-size="10" fill="#0369a1">PokedexIcon · SettingsIcon</text>

  <!-- Pokedex children -->
  <line x1="290" y1="274" x2="290" y2="344" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- FilterPokemon -->
  <rect x="192" y="344" width="100" height="44" rx="6" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1"/>
  <text x="242" y="361" text-anchor="middle" font-size="11" font-weight="600" fill="#0369a1">Filter</text>
  <text x="242" y="376" text-anchor="middle" font-size="10" fill="#0369a1">FilterPokemon.vue</text>
  <!-- PokedexItem -->
  <rect x="300" y="344" width="100" height="44" rx="6" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1"/>
  <text x="350" y="361" text-anchor="middle" font-size="11" font-weight="600" fill="#0369a1">List Item</text>
  <text x="350" y="376" text-anchor="middle" font-size="10" fill="#0369a1">PokedexItem.vue</text>
  <line x1="290" y1="274" x2="242" y2="344" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4 2"/>
  <line x1="290" y1="274" x2="350" y2="344" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4 2"/>

  <!-- Pokedex → PokemonCardController (child route / modal) -->
  <line x1="290" y1="274" x2="290" y2="418" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6 3" marker-end="url(#arrow)"/>
  <rect x="195" y="418" width="190" height="52" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="290" y="437" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">PokemonCardController</text>
  <text x="290" y="450" text-anchor="middle" font-size="10" fill="#92400e">route: /pokedex/:pokemonId</text>
  <text x="290" y="463" text-anchor="middle" font-size="10" fill="#b45309">modal overlay (child route)</text>

  <!-- Types children -->
  <line x1="620" y1="274" x2="620" y2="344" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="558" y="344" width="124" height="44" rx="6" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1"/>
  <text x="620" y="361" text-anchor="middle" font-size="11" font-weight="600" fill="#0369a1">TypesList.vue</text>
  <text x="620" y="376" text-anchor="middle" font-size="10" fill="#0369a1">All type cards</text>

  <!-- TypeModal -->
  <line x1="620" y1="388" x2="620" y2="428" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="556" y="428" width="128" height="36" rx="6" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1"/>
  <text x="620" y="446" text-anchor="middle" font-size="11" font-weight="600" fill="#0369a1">TypeModal.vue</text>
  <text x="620" y="459" text-anchor="middle" font-size="10" fill="#0369a1">Type detail popup</text>

  <!-- Settings children -->
  <line x1="920" y1="274" x2="920" y2="344" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="840" y="344" width="160" height="52" rx="8" fill="#0ea5e9" filter="url(#shadow)"/>
  <text x="920" y="364" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">About</text>
  <text x="920" y="379" text-anchor="middle" font-size="10" fill="#bae6fd">About.vue</text>
  <text x="920" y="392" text-anchor="middle" font-size="10" fill="#bae6fd">route: /settings/about</text>

  <!-- ═══════════════════════════════════════════════════════════
       LAYER 3 — PokemonCard and its tabs
  ═══════════════════════════════════════════════════════════ -->

  <line x1="290" y1="470" x2="290" y2="530" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="195" y="530" width="190" height="48" rx="8" fill="#d1fae5" stroke="#34d399" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="290" y="550" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">PokemonCard.vue</text>
  <text x="290" y="564" text-anchor="middle" font-size="10" fill="#065f46">CardHeader · CardSprite</text>

  <!-- Tabs from PokemonCard -->
  <!-- About tab -->
  <line x1="240" y1="578" x2="80" y2="630" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="20" y="630" width="120" height="40" rx="6" fill="#d1fae5" stroke="#34d399" stroke-width="1"/>
  <text x="80" y="647" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">About Tab</text>
  <text x="80" y="661" text-anchor="middle" font-size="10" fill="#065f46">PokemonAbout.vue</text>

  <!-- BaseStats tab -->
  <line x1="290" y1="578" x2="290" y2="630" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="195" y="630" width="190" height="40" rx="6" fill="#d1fae5" stroke="#34d399" stroke-width="1"/>
  <text x="290" y="647" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">Stats Tab</text>
  <text x="290" y="661" text-anchor="middle" font-size="10" fill="#065f46">PokemonBaseStats.vue</text>

  <!-- Moves tab -->
  <line x1="340" y1="578" x2="480" y2="630" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="400" y="630" width="160" height="40" rx="6" fill="#d1fae5" stroke="#34d399" stroke-width="1"/>
  <text x="480" y="647" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">Moves Tab</text>
  <text x="480" y="661" text-anchor="middle" font-size="10" fill="#065f46">PokemonMoves.vue</text>

  <!-- BaseStatChart inside Stats -->
  <line x1="290" y1="670" x2="290" y2="714" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="195" y="714" width="190" height="36" rx="6" fill="#d1fae5" stroke="#34d399" stroke-width="1"/>
  <text x="290" y="731" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">PokemonBaseStatChart.vue</text>
  <text x="290" y="744" text-anchor="middle" font-size="10" fill="#065f46">SVG bar chart</text>

  <!-- MovesTable inside Moves -->
  <line x1="480" y1="670" x2="480" y2="714" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="400" y="714" width="160" height="36" rx="6" fill="#d1fae5" stroke="#34d399" stroke-width="1"/>
  <text x="480" y="731" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">PokemonMovesTable.vue</text>
  <text x="480" y="744" text-anchor="middle" font-size="10" fill="#065f46">Moves list table</text>

  <!-- ═══════════════════════════════════════════════════════════
       SHARED / BASE COMPONENTS panel
  ═══════════════════════════════════════════════════════════ -->
  <rect x="690" y="480" width="370" height="260" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="875" y="500" text-anchor="middle" font-size="13" font-weight="700" fill="#475569">Shared Base Components</text>
  <text x="875" y="515" text-anchor="middle" font-size="10" fill="#94a3b8">used across all pages</text>

  <!-- Base components list -->
  <text x="710" y="538" font-size="11" fill="#334155">BaseButton.vue</text>
  <text x="710" y="554" font-size="11" fill="#334155">BaseButtonIcon.vue</text>
  <text x="710" y="570" font-size="11" fill="#334155">BaseInput.vue</text>
  <text x="710" y="586" font-size="11" fill="#334155">BaseModal.vue</text>
  <text x="710" y="602" font-size="11" fill="#334155">BaseProgressSpinner.vue</text>
  <text x="875" y="538" font-size="11" fill="#334155">BaseTab.vue</text>
  <text x="875" y="554" font-size="11" fill="#334155">BaseTag.vue</text>
  <text x="875" y="570" font-size="11" fill="#334155">BaseToast.vue</text>
  <text x="875" y="586" font-size="11" fill="#334155">BaseTooltip.vue</text>
  <text x="875" y="602" font-size="11" fill="#334155">BaseTypeTag.vue</text>

  <!-- Divider -->
  <line x1="706" y1="614" x2="1054" y2="614" stroke="#cbd5e1" stroke-width="1"/>

  <!-- Services / Utils -->
  <text x="875" y="632" text-anchor="middle" font-size="12" font-weight="700" fill="#475569">Services &amp; Utilities</text>
  <text x="710" y="650" font-size="11" fill="#334155">pokeApi.js — PokeAPI client</text>
  <text x="710" y="666" font-size="11" fill="#334155">usePokeApi.js — composable</text>
  <text x="710" y="682" font-size="11" fill="#334155">store/index.js — Vuex store</text>
  <text x="710" y="698" font-size="11" fill="#334155">theme.js — dark/light mode</text>
  <text x="710" y="714" font-size="11" fill="#334155">typeGradients.js — colors</text>
  <text x="710" y="730" font-size="11" fill="#334155">pokedexFilters.js — filtering</text>

  <!-- ═══════════════════════════════════════════════════════════
       LEGEND
  ═══════════════════════════════════════════════════════════ -->
  <rect x="20" y="800" width="580" height="80" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="40" y="820" font-size="12" font-weight="700" fill="#475569">Legend</text>

  <rect x="40" y="830" width="18" height="18" rx="4" fill="#6366f1"/>
  <text x="64" y="843" font-size="11" fill="#334155">Root App</text>

  <rect x="140" y="830" width="18" height="18" rx="4" fill="#0ea5e9"/>
  <text x="164" y="843" font-size="11" fill="#334155">Routed Page</text>

  <rect x="270" y="830" width="18" height="18" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="294" y="843" font-size="11" fill="#334155">Modal / Child Route</text>

  <rect x="430" y="830" width="18" height="18" rx="4" fill="#d1fae5" stroke="#34d399" stroke-width="1.5"/>
  <text x="454" y="843" font-size="11" fill="#334155">Feature Component</text>

  <line x1="40" y1="868" x2="70" y2="868" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="76" y="872" font-size="11" fill="#334155">Renders child</text>

  <line x1="190" y1="868" x2="220" y2="868" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6 3" marker-end="url(#arrow)"/>
  <text x="226" y="872" font-size="11" fill="#334155">Child route (modal)</text>

  <line x1="380" y1="868" x2="410" y2="868" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arrow)"/>
  <text x="416" y="872" font-size="11" fill="#334155">Sub-component</text>
</svg>
